<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA AI • Control Panel</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #0f0; font-family: 'IBM Plex Mono', monospace; overflow-x: hidden; }
        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px); background-size: 30px 30px; animation: gridScroll 20s linear infinite; pointer-events: none; }
        @keyframes gridScroll { 0% { background-position: 0 0; } 100% { background-position: 30px 30px; } }
        .glow-green { box-shadow: 0 0 15px rgba(0, 255, 65, 0.6), 0 0 30px rgba(0, 255, 65, 0.3); }
        .glow-cyan { box-shadow: 0 0 15px rgba(0, 255, 255, 0.6), 0 0 30px rgba(0, 255, 255, 0.3); }
        .glow-yellow { box-shadow: 0 0 15px rgba(255, 255, 0, 0.6), 0 0 30px rgba(255, 255, 0, 0.3); }
        .text-glow { text-shadow: 0 0 15px rgba(0, 255, 65, 1), 0 0 30px rgba(0, 255, 65, 0.7); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse { animation: pulse 2s ease-in-out infinite; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #0f0; border-radius: 3px; }
        .terminal-input { background: rgba(0, 0, 0, 0.9); border: 2px solid #0f0; color: #0f0; font-family: 'IBM Plex Mono', monospace; font-size: 16px; padding: 14px; border-radius: 8px; }
        .terminal-input:focus { outline: none; box-shadow: 0 0 20px rgba(0, 255, 65, 0.8); border-color: #0ff; }
        .btn { background: rgba(0, 0, 0, 0.9); border: 2px solid #0f0; color: #0f0; padding: 14px 20px; cursor: pointer; transition: all 0.3s; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; font-size: 14px; font-weight: 700; border-radius: 8px; min-height: 48px; touch-action: manipulation; }
        .btn:active { background: rgba(0, 255, 65, 0.2); transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { border-color: #f00; color: #f00; }
        .btn-danger:active { background: rgba(255, 0, 0, 0.2); }
        .msg-user { background: rgba(0, 255, 65, 0.15); border-left: 4px solid #0f0; padding: 14px; border-radius: 8px; margin-bottom: 12px; }
        .msg-nova { background: rgba(0, 255, 255, 0.15); border-left: 4px solid #0ff; padding: 14px; border-radius: 8px; margin-bottom: 12px; }
        .memory-card { background: rgba(0, 0, 0, 0.9); border: 2px solid rgba(0, 255, 65, 0.4); transition: all 0.3s; padding: 14px; border-radius: 8px; margin-bottom: 12px; }
        .memory-card:active { border-color: #0f0; box-shadow: 0 0 20px rgba(0, 255, 65, 0.4); transform: scale(0.98); }
        .upgrade-card { background: rgba(0, 0, 0, 0.9); border: 2px solid rgba(255, 255, 0, 0.4); padding: 16px; border-radius: 8px; margin-bottom: 12px; transition: all 0.3s; }
        .upgrade-card.unlocked { border-color: #0f0; background: rgba(0, 255, 65, 0.1); }
        .upgrade-card.locked { border-color: rgba(255, 255, 0, 0.4); }
        .upgrade-card:active { transform: scale(0.98); }
        .tab { flex: 1; padding: 16px; border: 2px solid rgba(0, 255, 65, 0.3); background: rgba(0, 0, 0, 0.8); color: #0f0; font-weight: 600; font-size: 12px; transition: all 0.3s; cursor: pointer; text-align: center; touch-action: manipulation; }
        .tab.active { background: rgba(0, 255, 65, 0.2); border-color: #0f0; box-shadow: 0 0 15px rgba(0, 255, 65, 0.5); }
        .tab:active { transform: scale(0.95); }
        .panel { display: none; }
        .panel.active { display: flex; }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0, 0, 0, 0) 50%, rgba(0, 255, 65, 0.01) 50%); background-size: 100% 4px; pointer-events: none; animation: scanlineMove 8s linear infinite; }
        @keyframes scanlineMove { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
        .status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 20px; background: rgba(0, 0, 0, 0.8); border: 2px solid #0f0; font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="scanline"></div>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        function NovaControlPanel() {
            const [status, setStatus] = useState({});
            const [memories, setMemories] = useState([]);
            const [dreams, setDreams] = useState([]);
            const [upgrades, setUpgrades] = useState([]);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [activeTab, setActiveTab] = useState('chat');
            const messagesEndRef = useRef(null);
            
            const scrollToBottom = (ref) => {
                ref.current?.scrollIntoView({ behavior: "smooth" });
            };
            
            useEffect(() => { scrollToBottom(messagesEndRef); }, [messages]);
            
            useEffect(() => {
                const fetchStatus = async () => {
                    try {
                        const res = await fetch('/api/status');
                        const data = await res.json();
                        setStatus(data);
                    } catch (err) { console.error('Status error:', err); }
                };
                fetchStatus();
                const interval = setInterval(fetchStatus, 3000);
                return () => clearInterval(interval);
            }, []);
            
            useEffect(() => {
                const fetchMemories = async () => {
                    try {
                        const res = await fetch('/api/memories?limit=10');
                        const data = await res.json();
                        setMemories(data.memories || []);
                    } catch (err) { console.error('Memories error:', err); }
                };
                fetchMemories();
                const interval = setInterval(fetchMemories, 5000);
                return () => clearInterval(interval);
            }, []);
            
            useEffect(() => {
                const fetchDreams = async () => {
                    try {
                        const res = await fetch('/api/dreams?limit=10');
                        const data = await res.json();
                        setDreams(data.dreams || []);
                    } catch (err) { console.error('Dreams error:', err); }
                };
                fetchDreams();
                const interval = setInterval(fetchDreams, 10000);
                return () => clearInterval(interval);
            }, []);
            
            useEffect(() => {
                const fetchUpgrades = async () => {
                    try {
                        const res = await fetch('/api/upgrades');
                        const data = await res.json();
                        setUpgrades(data.upgrades || []);
                    } catch (err) { console.error('Upgrades error:', err); }
                };
                fetchUpgrades();
                const interval = setInterval(fetchUpgrades, 5000);
                return () => clearInterval(interval);
            }, []);
            
            const sendMessage = async () => {
                if (!input.trim() || loading) return;
                const userMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setLoading(true);
                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: input })
                    });
                    const data = await res.json();
                    const novaMsg = { role: 'nova', content: data.response || 'Error: ' + (data.error || 'Unknown') };
                    setMessages(prev => [...prev, novaMsg]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'nova', content: 'Error: ' + err.message }]);
                }
                setLoading(false);
            };
            
            const controlAction = async (action) => {
                if (!confirm(`Are you sure you want to ${action.toUpperCase()}?`)) return;
                try {
                    const res = await fetch(`/api/control/${action}`, { method: 'POST' });
                    const data = await res.json();
                    alert(data.message || 'Action completed');
                } catch (err) { alert('Error: ' + err.message); }
            };
            
            const unlockUpgrade = async (upgradeId) => {
                try {
                    const res = await fetch(`/api/upgrades/unlock/${upgradeId}`, { method: 'POST' });
                    const data = await res.json();
                    if (data.success) {
                        alert(data.message);
                        const upRes = await fetch('/api/upgrades');
                        const upData = await upRes.json();
                        setUpgrades(upData.upgrades || []);
                        const stRes = await fetch('/api/status');
                        const stData = await stRes.json();
                        setStatus(stData);
                    } else {
                        alert(data.message);
                    }
                } catch (err) { alert('Error: ' + err.message); }
            };
            
            const resetUpgrades = async () => {
                if (!confirm('Reset all upgrades and restore points?')) return;
                try {
                    const res = await fetch('/api/upgrades/reset', { method: 'POST' });
                    const data = await res.json();
                    alert(data.message);
                    window.location.reload();
                } catch (err) { alert('Error: ' + err.message); }
            };
            
            const groupedUpgrades = upgrades.reduce((acc, up) => {
                if (!acc[up.type]) acc[up.type] = [];
                acc[up.type].push(up);
                return acc;
            }, {});
            
            return (
                <div className="relative z-10 min-h-screen flex flex-col p-3 sm:p-4 gap-3 sm:gap-4">
                    <div className="flex flex-col sm:flex-row items-center justify-between gap-3">
                        <h1 className="text-3xl sm:text-4xl font-bold text-glow" style={{ fontFamily: 'Orbitron, sans-serif' }}>
                            NOVA<span className="text-cyan-400"> AI</span>
                        </h1>
                        <div className="flex items-center gap-3 flex-wrap justify-center">
                            {status.ollama_ready && (
                                <div className="status-badge glow-green">
                                    <div className="w-3 h-3 bg-green-500 rounded-full pulse"></div>
                                    <span>ONLINE</span>
                                </div>
                            )}
                            {!status.ollama_ready && (
                                <div className="status-badge" style={{ borderColor: '#f00', color: '#f00' }}>
                                    <div className="w-3 h-3 bg-red-500 rounded-full pulse"></div>
                                    <span>OFFLINE</span>
                                </div>
                            )}
                            <div className="status-badge" style={{ borderColor: '#ff0', color: '#ff0' }}>
                                <span>⚡ {status.upgrade_points || 0} PTS</span>
                            </div>
                            <div className="status-badge">
                                <span>LVL {status.level || 1}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex gap-2 rounded-lg overflow-hidden flex-wrap">
                        <div className={`tab ${activeTab === 'chat' ? 'active' : ''}`} onClick={() => setActiveTab('chat')}>💬 CHAT</div>
                        <div className={`tab ${activeTab === 'thoughts' ? 'active' : ''}`} onClick={() => setActiveTab('thoughts')}>🧠 THOUGHTS</div>
                        <div className={`tab ${activeTab === 'dreams' ? 'active' : ''}`} onClick={() => setActiveTab('dreams')}>🌙 DREAMS</div>
                        <div className={`tab ${activeTab === 'upgrades' ? 'active' : ''}`} onClick={() => setActiveTab('upgrades')}>⚡ UPGRADES</div>
                        <div className={`tab ${activeTab === 'control' ? 'active' : ''}`} onClick={() => setActiveTab('control')}>🎛️ CONTROL</div>
                    </div>
                    
                    {/* Chat Panel */}
                    <div className={`panel ${activeTab === 'chat' ? 'active' : ''} flex-col flex-1 border-2 border-green-500 glow-green rounded-lg p-4`}>
                        <h2 className="text-lg font-bold mb-4 text-cyan-400" style={{ fontFamily: 'Orbitron' }}>› CHAT</h2>
                        <div className="flex-1 overflow-y-auto mb-4" style={{ maxHeight: 'calc(100vh - 350px)' }}>
                            {messages.length === 0 && <div className="text-green-700 text-sm p-3 border border-green-900 rounded-lg">&gt; Ready...</div>}
                            {messages.map((msg, i) => (
                                <div key={i} className={msg.role === 'user' ? 'msg-user' : 'msg-nova'}>
                                    <div className="text-xs font-bold mb-2">{msg.role === 'user' ? '[USER]' : '[NOVA]'}</div>
                                    <div className="text-sm leading-relaxed">{msg.content}</div>
                                </div>
                            ))}
                            {loading && <div className="msg-nova"><div className="text-xs font-bold text-cyan-700 mb-2">[NOVA]</div><div className="text-sm pulse">Processing...</div></div>}
                            <div ref={messagesEndRef} />
                        </div>
                        <div className="flex gap-2">
                            <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && sendMessage()} placeholder="Type..." className="flex-1 terminal-input" disabled={loading} />
                            <button onClick={sendMessage} disabled={loading} className="btn" style={{ minWidth: '80px' }}>SEND</button>
                        </div>
                    </div>
                    
                    {/* Thoughts Panel */}
                    <div className={`panel ${activeTab === 'thoughts' ? 'active' : ''} flex-col flex-1 border-2 border-cyan-400 glow-cyan rounded-lg p-4`}>
                        <h2 className="text-lg font-bold mb-4 text-green-400" style={{ fontFamily: 'Orbitron' }}>› THOUGHTS</h2>
                        <div className="flex-1 overflow-y-auto" style={{ maxHeight: 'calc(100vh - 250px)' }}>
                            {memories.length === 0 && <div className="text-cyan-700 text-sm p-3 border border-cyan-900 rounded-lg">&gt; No thoughts...</div>}
                            {memories.map((mem) => (
                                <div key={mem.id} className="memory-card">
                                    <div className="flex items-center justify-between mb-3">
                                        <span className="text-xs font-bold uppercase px-3 py-1 rounded" style={{ background: 'rgba(0,255,255,0.2)', color: '#0ff', border: '1px solid #0ff' }}>{mem.type}</span>
                                        <span className="text-xs text-green-700">{new Date(mem.timestamp).toLocaleTimeString()}</span>
                                    </div>
                                    <div className="text-sm leading-relaxed text-green-300">{mem.content}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    {/* Dreams Panel */}
                    <div className={`panel ${activeTab === 'dreams' ? 'active' : ''} flex-col flex-1 border-2 border-purple-500 rounded-lg p-4`} style={{ boxShadow: '0 0 15px rgba(138,43,226,0.5)' }}>
                        <h2 className="text-lg font-bold mb-4 text-purple-400" style={{ fontFamily: 'Orbitron' }}>› DREAMS</h2>
                        <div className="flex-1 overflow-y-auto" style={{ maxHeight: 'calc(100vh - 250px)' }}>
                            {dreams.length === 0 && <div className="text-purple-700 text-sm p-3 border border-purple-900 rounded-lg">&gt; No dreams yet...</div>}
                            {dreams.map((dream) => (
                                <div key={dream.id} className="memory-card" style={{ borderColor: 'rgba(138,43,226,0.4)' }}>
                                    <div className="flex items-center justify-between mb-3">
                                        <span className="text-xs font-bold uppercase px-3 py-1 rounded" style={{ background: 'rgba(138,43,226,0.2)', color: '#ba55d3', border: '1px solid #ba55d3' }}>{dream.dream_type}</span>
                                        <span className="text-xs text-purple-400">{dream.intensity}</span>
                                    </div>
                                    <div className="text-sm leading-relaxed text-purple-300">{dream.content}</div>
                                    <div className="text-xs text-purple-700 mt-2">{new Date(dream.timestamp).toLocaleString()}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    {/* Upgrades Panel */}
                    <div className={`panel ${activeTab === 'upgrades' ? 'active' : ''} flex-col flex-1 border-2 border-yellow-500 glow-yellow rounded-lg p-4`}>
                        <div className="flex items-center justify-between mb-4">
                            <h2 className="text-lg font-bold text-yellow-400" style={{ fontFamily: 'Orbitron' }}>› UPGRADES</h2>
                            <button onClick={resetUpgrades} className="text-xs px-3 py-1 border border-red-500 text-red-500 rounded hover:bg-red-900">RESET</button>
                        </div>
                        <div className="mb-4 p-3 border-2 border-yellow-700 rounded-lg bg-black bg-opacity-50">
                            <div className="text-sm text-yellow-400">💰 Upgrade Points: <span className="font-bold text-xl">{status.upgrade_points || 0}</span></div>
                            <div className="text-xs text-yellow-700 mt-1">Dreams: {status.dream_count || 0} | Memories: {status.memory_count || 0}</div>
                        </div>
                        <div className="flex-1 overflow-y-auto" style={{ maxHeight: 'calc(100vh - 350px)' }}>
                            {Object.entries(groupedUpgrades).map(([type, ups]) => (
                                <div key={type} className="mb-4">
                                    <h3 className="text-sm font-bold text-yellow-500 mb-2 uppercase">{type}</h3>
                                    {ups.map((up) => (
                                        <div key={up.id} className={`upgrade-card ${up.unlocked ? 'unlocked' : 'locked'}`}>
                                            <div className="flex items-start justify-between mb-2">
                                                <div className="flex items-center gap-2">
                                                    <span className="text-2xl">{up.icon}</span>
                                                    <div>
                                                        <div className="font-bold text-sm">{up.name}</div>
                                                        <div className="text-xs text-gray-400">{up.description}</div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex items-center justify-between mt-3">
                                                <span className="text-xs font-bold text-yellow-400">💰 {up.cost} pts</span>
                                                {up.unlocked ? (
                                                    <span className="text-xs font-bold text-green-500 px-3 py-1 border border-green-500 rounded">✓ UNLOCKED</span>
                                                ) : (
                                                    <button onClick={() => unlockUpgrade(up.id)} className="text-xs font-bold px-4 py-2 bg-yellow-900 border border-yellow-500 text-yellow-400 rounded hover:bg-yellow-800">UNLOCK</button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    {/* Control Panel */}
                    <div className={`panel ${activeTab === 'control' ? 'active' : ''} flex-col flex-1 border-2 border-red-500 rounded-lg p-4`}>
                        <h2 className="text-lg font-bold mb-4 text-red-400" style={{ fontFamily: 'Orbitron' }}>› CONTROL</h2>
                        <div className="grid grid-cols-1 gap-3">
                            <button onClick={() => controlAction('start')} className="btn">▶ START</button>
                            <button onClick={() => controlAction('restart')} className="btn">↻ RESTART</button>
                            <button onClick={() => controlAction('stop')} className="btn btn-danger">■ STOP</button>
                            <button onClick={() => controlAction('clear-memory')} className="btn btn-danger">⌫ CLEAR MEMORY</button>
                        </div>
                    </div>
                    
                    <div className="text-xs text-green-800 text-center mt-2">NOVA AI v2.0 • {new Date().toLocaleDateString()}</div>
                </div>
            );
        }
        
        ReactDOM.render(<NovaControlPanel />, document.getElementById('root'));
    </script>
</body>
</html>
