<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaGrammar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 520px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }
    .header {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo { font-size: 22px; }
    .header-text h1 { color: white; font-size: 16px; font-weight: 700; }
    .header-text p { color: rgba(255,255,255,0.75); font-size: 11px; }
    .badge {
      margin-left: auto;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    /* Ad Banner */
    .ad-banner {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 6px 10px;
      text-align: center;
      font-size: 10px;
      color: #94a3b8;
    }
    .ad-banner .ad-label { font-size: 9px; color: #cbd5e1; margin-bottom: 2px; }
    .ad-slot {
      width: 360px;
      height: 60px;
      background: linear-gradient(90deg, #f1f5f9, #e2e8f0, #f1f5f9);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      cursor: pointer;
      text-decoration: none;
      color: #64748b;
      font-size: 11px;
      font-weight: 500;
      border: 1px dashed #cbd5e1;
    }

    .textarea-wrap {
      padding: 14px 16px 8px;
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: 10px 12px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      background: white;
      color: #1e293b;
      line-height: 1.5;
    }
    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: #94a3b8; }

    .controls {
      padding: 0 16px 12px;
      display: flex;
      gap: 8px;
    }
    .btn-check {
      flex: 1;
      background: #6366f1;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-check:hover { background: #4f46e5; }
    .btn-check:disabled { background: #a5b4fc; cursor: not-allowed; }
    .btn-clear {
      background: #f1f5f9;
      color: #64748b;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-clear:hover { background: #e2e8f0; }

    .status-bar {
      padding: 6px 16px;
      font-size: 11px;
      color: #64748b;
      min-height: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid #e2e8f0;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results {
      padding: 0 16px 14px;
      max-height: 220px;
      overflow-y: auto;
    }
    .results::-webkit-scrollbar { width: 4px; }
    .results::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

    .no-errors {
      text-align: center;
      padding: 20px;
      color: #22c55e;
      font-size: 13px;
      font-weight: 500;
    }
    .no-errors svg { display: block; margin: 0 auto 8px; }

    .error-item {
      background: white;
      border: 1px solid #fee2e2;
      border-left: 3px solid #ef4444;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }
    .error-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .error-item.rule-style { border-left-color: #f59e0b; border-color: #fef3c7; }
    .error-item.rule-punctuation { border-left-color: #3b82f6; border-color: #dbeafe; }

    .error-context {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 4px;
      font-style: italic;
    }
    .error-context mark {
      background: #fde68a;
      border-radius: 2px;
      padding: 0 2px;
      font-style: normal;
    }
    .error-message {
      font-size: 12px;
      color: #374151;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .suggestion-chip {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      cursor: pointer;
      font-weight: 500;
    }
    .suggestion-chip:hover { background: #dcfce7; }

    .stats-bar {
      padding: 8px 16px;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: #64748b;
    }
    .stat { display: flex; align-items: center; gap: 4px; }
    .stat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .dot-red { background: #ef4444; }
    .dot-amber { background: #f59e0b; }
    .dot-blue { background: #3b82f6; }

    .page-check-btn {
      margin: 0 16px 10px;
      width: calc(100% - 32px);
      background: #f1f5f9;
      color: #4f46e5;
      border: 1px solid #c7d2fe;
      padding: 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
    }
    .page-check-btn:hover { background: #e0e7ff; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">✍️</div>
    <div class="header-text">
      <h1>NovaGrammar</h1>
      <p>Free grammar & style checker</p>
    </div>
    <div class="badge">FREE</div>
  </div>

  <!-- Ad Banner -->
  <div class="ad-banner">
    <div class="ad-label">Advertisement</div>
    <a class="ad-slot" id="adSlot" href="#" target="_blank">
      <!-- Google AdSense ad unit goes here -->
      <span>📢 Your Ad Here — Contact us to advertise</span>
    </a>
  </div>

  <div class="textarea-wrap">
    <textarea id="inputText" placeholder="Paste or type your text here to check grammar, spelling, and style..."></textarea>
  </div>

  <div class="controls">
    <button class="btn-check" id="checkBtn">Check Grammar</button>
    <button class="btn-clear" id="clearBtn">Clear</button>
  </div>

  <button class="page-check-btn" id="pageCheckBtn">📄 Check Selected Text on Page</button>

  <div class="status-bar">
    <div class="spinner" id="spinner"></div>
    <span id="statusText">Enter text above to get started</span>
  </div>

  <div class="results" id="results"></div>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat"><div class="stat-dot dot-red"></div><span id="errCount">0 errors</span></div>
    <div class="stat"><div class="stat-dot dot-amber"></div><span id="styleCount">0 style</span></div>
    <div class="stat"><div class="stat-dot dot-blue"></div><span id="wordCount">0 words</span></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
